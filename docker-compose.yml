services:
  postgres:
    image: postgres:16.4
    container_name: edu-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.10.2-python3.11
    container_name: airflow-init
    restart: "no"
    env_file:
      - .env
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      EDU_PLATFORM_DB: ${EDU_PLATFORM_DB}
      EDU_PLATFORM_DB_HOST: ${EDU_PLATFORM_HOST}
      EDU_PLATFORM_DB_PORT: ${EDU_PLATFORM_PORT}
      EDU_PLATFORM_DB_USER: ${EDU_WRITER_USER}
      EDU_PLATFORM_DB_PASSWORD: ${EDU_WRITER_PASSWORD}
      EDU_PLATFORM_DB_SCHEMA: ${EDU_PLATFORM_SCHEMA}
      AIRFLOW_TMP_DIR: ${AIRFLOW_TMP_DIR}
      PYTHONPATH: /opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    working_dir: /opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - airflow_tmp:/opt/airflow/tmp
    command:
      - bash
      - -lc
      - |
        airflow db migrate &&
        airflow users create \
          --role Admin \
          --username "$AIRFLOW_ADMIN_USERNAME" \
          --password "$AIRFLOW_ADMIN_PASSWORD" \
          --firstname Platform \
          --lastname Admin \
          --email "$AIRFLOW_ADMIN_EMAIL" || true

  airflow-webserver:
    image: apache/airflow:2.10.2-python3.11
    container_name: airflow-webserver
    restart: unless-stopped
    env_file:
      - .env
    environment: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    working_dir: /opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - airflow_tmp:/opt/airflow/tmp
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.2-python3.11
    container_name: airflow-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    working_dir: /opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - airflow_tmp:/opt/airflow/tmp
    command: scheduler

volumes:
  postgres_data:
  airflow_logs:
  airflow_tmp:
